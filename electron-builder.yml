appId: com.ai-education.app
productName: AI Education
copyright: Copyright © 2024 AI Education Team

npmRebuild: false

directories:
  output: release
  buildResources: electron/build

files:
  - electron/**/*
  - package.json
  - "!.env"
  - "!node_modules/.cache/**/*"
  - "!src/**/*"
  - "!prisma/**/*"
  - "!download/**/*"
  - "!*.log"
  - "!.*"

extraResources:
  - from: ".next/standalone"
    to: "server"
    filter:
      - "**/*"
  - from: "public"
    to: "server/public"
    filter:
      - "**/*"

# 只打包便携版，避免NSIS编码问题
win:
  target:
    - target: portable
      arch:
        - x64

portable:
  artifactName: ${productName}-${version}-Portable.exe

publish: null

# 压缩配置
compression: maximum

# 构建信息
buildVersion: "1.0.0"
